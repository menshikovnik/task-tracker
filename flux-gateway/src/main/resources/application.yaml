spring:
  config:
    import: optional:file:.env[.properties]

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: flux-auth
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**

            - id: flux-api
              uri: http://localhost:8081
              predicates:
                - Path=/api/**

            - id: flux-search
              uri: http://localhost:8082
              predicates:
                - Path=/api/search/**
  application:
    name: flux-gateway

jwt:
  secret: ${JWT_SECRET}

server:
  port: 8080
